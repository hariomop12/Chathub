services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatapp
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  peerjs:
    image: node:20-alpine
    restart: unless-stopped
    command: npx peer --port 5001 --path /peerjs
    ports:
      - "5001:5001"

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5002:5000"
    env_file:
      - ./backend-go/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/chatapp?sslmode=disable
      PORT: "5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5174"
        VITE_CLERK_PUBLISHABLE_KEY: pk_test_d2l0dHktdG91Y2FuLTIuY2xlcmsuYWNjb3VudHMuZGV2JA
        VITE_PEER_PORT: "5001"
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  pgdata:
